name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: life-decision-simulator/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: life-decision-simulator/backend/pyproject.toml

      - name: Install CPU-only PyTorch
        # sentence-transformers depends on torch; the CPU wheel keeps the runner small
        # and avoids pulling the multi-GB CUDA build that PyPI serves by default.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install backend (editable, includes test deps)
        run: pip install -e .

      - name: Run tests
        # No API keys, Qdrant, or network needed — the retriever and web-search
        # layers degrade gracefully, and sessions run in memory.
        run: pytest -q

  frontend:
    name: Frontend · typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: life-decision-simulator/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: life-decision-simulator/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        # `npm run build` is `tsc && vite build` — fails on any type error.
        run: npm run build
